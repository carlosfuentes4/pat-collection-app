workflows:
  ios-build:
    name: Pat Collection iOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar dependencias
        script: |
          pip3 install "flet[mobile]" pillow "python-barcode[images]" requests
      - name: Instalar Flutter
        script: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable ~/flutter
          export PATH="$PATH:$HOME/flutter/bin"
          flutter precache --ios
          flutter doctor
      - name: Build IPA
        script: |
          export PATH="$PATH:$HOME/flutter/bin"
          flet build ipa \
            --project "PatCollection" \
            --org com.patcollection \
            --bundle-id com.patcollection.app \
            --yes
      - name: Convertir xcarchive a ipa
        script: |
          XCARCHIVE=$(find . -name "*.xcarchive" | head -1)
          echo "xcarchive encontrado: $XCARCHIVE"
          mkdir -p build/ipa/Payload
          cp -r "$XCARCHIVE/Products/Applications/"*.app build/ipa/Payload/
          cd build/ipa
          zip -r PatCollection.ipa Payload
          echo "=== IPA generado ==="
          find . -name "*.ipa"
    artifacts:
      - "**/*.ipa"
    publishing:
      email:
        recipients:
          - carlosfuent0059@gmail.com