workflows:
  ios-build:
    name: Pat Collection iOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Instalar dependencias
        script: |
          pip3 install "flet[mobile]" pillow "python-barcode[images]" requests
      - name: Instalar Flutter
        script: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable ~/flutter
          export PATH="$PATH:$HOME/flutter/bin"
          flutter precache --ios
          flutter doctor
      - name: Build IPA
        script: |
          export PATH="$PATH:$HOME/flutter/bin"
          flet build ipa \
            --project "PatCollection" \
            --org com.patcollection \
            --bundle-id com.patcollection.app \
            --permissions photo_library \
            --yes
      - name: Inyectar permisos y convertir a ipa
        script: |
          XCARCHIVE=$(find . -name "*.xcarchive" | head -1)
          echo "xcarchive encontrado: $XCARCHIVE"
          APP=$(find "$XCARCHIVE/Products/Applications/" -name "*.app" | head -1)
          echo "app encontrada: $APP"

          # Inyectar permisos en Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$APP/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled true" "$APP/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$APP/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace true" "$APP/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Pat Collection necesita acceso para guardar etiquetas'" "$APP/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Pat Collection necesita acceso para guardar etiquetas'" "$APP/Info.plist"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Pat Collection necesita acceso para guardar etiquetas'" "$APP/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Pat Collection necesita acceso para guardar etiquetas'" "$APP/Info.plist"

          echo "=== Verificando Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :UIFileSharingEnabled" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryAddUsageDescription" "$APP/Info.plist"

          # Empaquetar
          mkdir -p build/ipa/Payload
          cp -r "$APP" build/ipa/Payload/
          cd build/ipa
          zip -r PatCollection.ipa Payload
          echo "=== IPA generado ==="
          find . -name "*.ipa"
    artifacts:
      - "**/*.ipa"
    publishing:
      email:
        recipients:
          - carlosfuent0059@gmail.com